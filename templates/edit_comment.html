<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>댓글 수정</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h2>댓글 수정하기</h2>
    <form method="POST">
      <textarea name="content" class="form-control" rows="3">{{ comment.content }}</textarea><br>
      <button type="submit" class="btn btn-primary">수정 완료</button>
    </form>
    <br>
    <a href="/post/{{ comment.post_id }}">← 돌아가기</a>
  </div>
</body>
</html>
