<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>새 글 작성</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h2 class="mb-4">✏️ 새 글 작성</h2>

    <form method="POST">
      <div class="mb-3">
        <input type="text" name="title" class="form-control" placeholder="제목" required>
      </div>
      <div class="mb-3">
        <textarea name="content" class="form-control" rows="6" placeholder="내용을 입력하세요" required></textarea>
      </div>
      <div class="mb-3">
        <input type="text" name="category" class="form-control" placeholder="카테고리">
      </div>
      <div class="mb-3">
        <input type="text" name="tags" class="form-control" placeholder="태그 (쉼표로 구분)">
      </div>
      <button type="submit" class="btn btn-success">작성 완료</button>
      <a href="/" class="btn btn-outline-secondary ms-2">← 돌아가기</a>
    </form>
  </div>
</body>
</html>
