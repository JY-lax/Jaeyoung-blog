<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h2 class="mb-4">📝 회원가입</h2>
    <form method="POST">
      <input type="text" name="username" placeholder="아이디" class="form-control mb-2" required>
      <input type="password" name="password" placeholder="비밀번호" class="form-control mb-2" required>
      <input type="email" name="email" placeholder="이메일" class="form-control mb-2">
      <textarea name="profile" placeholder="자기소개" class="form-control mb-2"></textarea>
      <button type="submit" class="btn btn-success">가입하기</button>
    </form>
    <br>
    <a href="/login">← 로그인 페이지로</a>
  </div>
</body>
</html>
